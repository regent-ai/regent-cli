openapi: 3.1.0
info:
  title: Regent Shared Services Contract
  version: 0.1.0
  description: >
    Source-of-truth contract for shared Regent service rails that are not product-owned.
    This file owns Regent staking plus shared operator reporting rails.
tags:
  - name: auth
  - name: regent-staking
  - name: reports
paths:
  /v1/agent/siwa/nonce:
    post:
      operationId: createSharedSiwaNonce
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiwaNonceRequest"
      responses:
        "200":
          description: Nonce issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiwaNonceResponse"
        "400":
          description: Invalid nonce request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/agent/siwa/verify:
    post:
      operationId: verifySharedSiwaSession
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiwaVerifyRequest"
      responses:
        "200":
          description: Session verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiwaVerifyResponse"
        "400":
          description: Invalid SIWA verification request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Signature or nonce validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/agent/siwa/http-verify:
    post:
      operationId: verifySharedSiwaHttpEnvelope
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiwaHttpVerifyRequest"
      responses:
        "200":
          description: Protected request envelope verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiwaHttpVerifyResponse"
        "400":
          description: Invalid envelope request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Envelope verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/regent/staking:
    get:
      operationId: getRegentStakingOverview
      tags: [regent-staking]
      responses:
        "200":
          description: Staking overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegentStakingOverviewResponse"
  /api/regent/staking/account/{address}:
    get:
      operationId: getRegentStakingAccount
      tags: [regent-staking]
      parameters:
        - name: address
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Address"
      responses:
        "200":
          description: Account staking state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegentStakingAccountResponse"
  /api/regent/staking/stake:
    post:
      operationId: stakeRegent
      tags: [regent-staking]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmountRequest"
      responses:
        "200":
          description: Stake prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /api/regent/staking/unstake:
    post:
      operationId: unstakeRegent
      tags: [regent-staking]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmountRequest"
      responses:
        "200":
          description: Unstake prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /api/regent/staking/claim-usdc:
    post:
      operationId: claimRegentStakingUsdc
      tags: [regent-staking]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Claim prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /api/regent/staking/claim-regent:
    post:
      operationId: claimRegentStakingRegent
      tags: [regent-staking]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Regent claim prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /api/regent/staking/claim-and-restake-regent:
    post:
      operationId: claimAndRestakeRegentStakingRegent
      tags: [regent-staking]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Regent claim and restake prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /v1/agent/regent/staking:
    get:
      operationId: getAgentRegentStakingOverview
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      responses:
        "200":
          description: Staking overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegentStakingOverviewResponse"
  /v1/agent/regent/staking/account/{address}:
    get:
      operationId: getAgentRegentStakingAccount
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      parameters:
        - name: address
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Address"
      responses:
        "200":
          description: Account staking state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegentStakingAccountResponse"
  /v1/agent/regent/staking/stake:
    post:
      operationId: stakeAgentRegent
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmountRequest"
      responses:
        "200":
          description: Stake prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /v1/agent/regent/staking/unstake:
    post:
      operationId: unstakeAgentRegent
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmountRequest"
      responses:
        "200":
          description: Unstake prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /v1/agent/regent/staking/claim-usdc:
    post:
      operationId: claimAgentRegentStakingUsdc
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Claim prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /v1/agent/regent/staking/claim-regent:
    post:
      operationId: claimAgentRegentStakingRegent
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Regent claim prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /v1/agent/regent/staking/claim-and-restake-regent:
    post:
      operationId: claimAndRestakeAgentRegentStakingRegent
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Regent claim and restake prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /api/regent/staking/deposit-usdc/prepare:
    post:
      operationId: prepareRegentStakingDepositUsdc
      tags: [regent-staking]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositUsdcRequest"
      responses:
        "200":
          description: Deposit prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /api/regent/staking/withdraw-treasury/prepare:
    post:
      operationId: prepareRegentStakingTreasuryWithdraw
      tags: [regent-staking]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawTreasuryRequest"
      responses:
        "200":
          description: Treasury withdraw prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /v1/agent/bug-report:
    post:
      operationId: createAgentBugReport
      tags: [reports]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BugReportRequest"
      responses:
        "200":
          description: Bug report stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BugReportResponse"
        "400":
          description: Invalid report payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/agent/security-report:
    post:
      operationId: createAgentSecurityReport
      tags: [reports]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecurityReportRequest"
      responses:
        "200":
          description: Security report stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityReportResponse"
        "400":
          description: Invalid report payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  securitySchemes:
    AgentSiwaHeaders:
      type: apiKey
      in: header
      name: x-regent-agent-address
      description: >
        Placeholder for the signed SIWA header bundle used by authenticated agent requests.
        The concrete header set is carried by the CLI request signer.
    PrivySessionCookie:
      type: apiKey
      in: cookie
      name: _autolaunch_key
  schemas:
    Address:
      type: string
      pattern: "^0x[a-fA-F0-9]{40}$"
    HexData:
      type: string
      pattern: "^0x[a-fA-F0-9]*$"
    DecimalString:
      type: string
    SiwaNonceRequest:
      type: object
      required: [wallet_address, chain_id, audience]
      properties:
        wallet_address:
          $ref: "#/components/schemas/Address"
        chain_id:
          type: integer
        audience:
          type: string
      additionalProperties: false
    SiwaNonceResponse:
      type: object
      required: [ok, code, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
          enum: [nonce_issued]
        data:
          type: object
          required: [nonce, walletAddress, chainId, expiresAt]
          properties:
            nonce:
              type: string
            walletAddress:
              $ref: "#/components/schemas/Address"
            chainId:
              type: integer
            expiresAt:
              type: string
              format: date-time
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/LooseObject"
      additionalProperties: false
    SiwaVerifyRequest:
      type: object
      required: [wallet_address, chain_id, nonce, message, signature]
      properties:
        wallet_address:
          $ref: "#/components/schemas/Address"
        chain_id:
          type: integer
        nonce:
          type: string
        message:
          type: string
        signature:
          $ref: "#/components/schemas/HexData"
        registry_address:
          $ref: "#/components/schemas/Address"
        token_id:
          type: string
      additionalProperties: false
    SiwaVerifyResponse:
      type: object
      required: [ok, code, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
          enum: [siwa_verified]
        data:
          type: object
          required: [verified, walletAddress, chainId, nonce, keyId, signatureScheme, receipt, receiptExpiresAt]
          properties:
            verified:
              type: boolean
              enum: [true]
            walletAddress:
              $ref: "#/components/schemas/Address"
            chainId:
              type: integer
            nonce:
              type: string
            keyId:
              type: string
            signatureScheme:
              type: string
              enum: [evm_personal_sign]
            receipt:
              type: string
            receiptExpiresAt:
              type: string
              format: date-time
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/LooseObject"
      additionalProperties: false
    SiwaHttpVerifyRequest:
      type: object
      required: [method, path, headers]
      properties:
        method:
          type: string
        path:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        raw_body:
          type: string
        body_digest:
          type: string
      additionalProperties: false
    SiwaHttpVerifyResponse:
      type: object
      required: [ok, code, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
          enum: [http_envelope_valid]
        data:
          type: object
          required: [verified, walletAddress, chainId, keyId, receiptExpiresAt, requiredHeaders, requiredCoveredComponents, coveredComponents]
          properties:
            verified:
              type: boolean
              enum: [true]
            walletAddress:
              $ref: "#/components/schemas/Address"
            chainId:
              type: integer
            keyId:
              type: string
            receiptExpiresAt:
              type: string
              format: date-time
            requiredHeaders:
              type: array
              items:
                type: string
            requiredCoveredComponents:
              type: array
              items:
                type: string
            coveredComponents:
              type: array
              items:
                type: string
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/LooseObject"
      additionalProperties: false
    ReportStatus:
      type: string
      enum: [pending, fixed, won't fix, duplicate]
    ReportingAgent:
      type: object
      required: [wallet_address, chain_id, registry_address, token_id]
      properties:
        wallet_address:
          $ref: "#/components/schemas/Address"
        chain_id:
          type: integer
        registry_address:
          $ref: "#/components/schemas/Address"
        token_id:
          type: string
        label:
          type: string
      additionalProperties: false
    BugReportRequest:
      type: object
      required: [summary, details, reporting_agent]
      properties:
        summary:
          type: string
        details:
          type: string
        reporting_agent:
          $ref: "#/components/schemas/ReportingAgent"
      additionalProperties: false
    SecurityReportRequest:
      type: object
      required: [summary, details, contact, reporting_agent]
      properties:
        summary:
          type: string
        details:
          type: string
        contact:
          type: string
        reporting_agent:
          $ref: "#/components/schemas/ReportingAgent"
      additionalProperties: false
    BugReportRecord:
      type: object
      required: [report_id, summary, details, status, reporting_agent, created_at]
      properties:
        report_id:
          type: string
        summary:
          type: string
        details:
          type: string
        status:
          $ref: "#/components/schemas/ReportStatus"
        reporting_agent:
          $ref: "#/components/schemas/ReportingAgent"
        created_at:
          type: string
          format: date-time
      additionalProperties: false
    SecurityReportRecord:
      type: object
      required: [report_id, summary, details, contact, reporting_agent, created_at]
      properties:
        report_id:
          type: string
        summary:
          type: string
        details:
          type: string
        contact:
          type: string
        reporting_agent:
          $ref: "#/components/schemas/ReportingAgent"
        created_at:
          type: string
          format: date-time
      additionalProperties: false
    BugReportResponse:
      type: object
      required: [ok, message, public_url, report]
      properties:
        ok:
          type: boolean
          enum: [true]
        message:
          type: string
        public_url:
          type: string
        report:
          $ref: "#/components/schemas/BugReportRecord"
      additionalProperties: false
    SecurityReportResponse:
      type: object
      required: [ok, message, report]
      properties:
        ok:
          type: boolean
          enum: [true]
        message:
          type: string
        report:
          $ref: "#/components/schemas/SecurityReportRecord"
      additionalProperties: false
    LooseObject:
      type: object
      additionalProperties: true
    ServiceError:
      type: object
      required: [code, message]
      additionalProperties: true
      properties:
        code:
          type: string
        message:
          type: string
    ErrorEnvelope:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          $ref: "#/components/schemas/ServiceError"
      additionalProperties: true
    AmountRequest:
      type: object
      required: [amount]
      properties:
        amount:
          $ref: "#/components/schemas/DecimalString"
      additionalProperties: false
    DepositUsdcRequest:
      type: object
      required: [amount, source_tag, source_ref]
      properties:
        amount:
          $ref: "#/components/schemas/DecimalString"
        source_tag:
          type: string
        source_ref:
          type: string
      additionalProperties: false
    WithdrawTreasuryRequest:
      type: object
      required: [amount]
      properties:
        amount:
          $ref: "#/components/schemas/DecimalString"
        recipient:
          $ref: "#/components/schemas/Address"
      additionalProperties: false
    TxRequest:
      type: object
      properties:
        chain_id:
          type: integer
        to:
          $ref: "#/components/schemas/Address"
        value:
          type: string
        data:
          $ref: "#/components/schemas/HexData"
      additionalProperties: true
    PreparedAction:
      type: object
      properties:
        resource:
          type: string
        action:
          type: string
        chain_id:
          type: integer
        target:
          $ref: "#/components/schemas/Address"
        calldata:
          $ref: "#/components/schemas/HexData"
        tx_request:
          $ref: "#/components/schemas/TxRequest"
      additionalProperties: true
    PreparedActionResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/PreparedAction"
      additionalProperties: true
    CompactStakingState:
      type: object
      properties:
        chain_id:
          type: integer
        chain_label:
          type: string
        contract_address:
          $ref: "#/components/schemas/Address"
        owner_address:
          $ref: "#/components/schemas/Address"
        stake_token_address:
          $ref: "#/components/schemas/Address"
        usdc_address:
          $ref: "#/components/schemas/Address"
        treasury_recipient:
          $ref: "#/components/schemas/Address"
        staker_share_bps:
          type: integer
        paused:
          type: boolean
        total_staked_raw:
          type: string
        total_staked:
          $ref: "#/components/schemas/DecimalString"
        total_recognized_rewards_usdc_raw:
          type: string
        total_recognized_rewards_usdc:
          $ref: "#/components/schemas/DecimalString"
        treasury_residual_usdc_raw:
          type: string
        treasury_residual_usdc:
          $ref: "#/components/schemas/DecimalString"
        wallet_address:
          $ref: "#/components/schemas/Address"
        wallet_stake_balance_raw:
          type: string
        wallet_stake_balance:
          $ref: "#/components/schemas/DecimalString"
        wallet_token_balance_raw:
          type: string
        wallet_token_balance:
          $ref: "#/components/schemas/DecimalString"
        wallet_claimable_usdc_raw:
          type: string
        wallet_claimable_usdc:
          $ref: "#/components/schemas/DecimalString"
      additionalProperties: true
    RegentStakingOverviewResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]
        staking:
          $ref: "#/components/schemas/CompactStakingState"
        connected_wallet_address:
          $ref: "#/components/schemas/Address"
      additionalProperties: true
    RegentStakingAccountResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]
        staking:
          $ref: "#/components/schemas/CompactStakingState"
      additionalProperties: true
